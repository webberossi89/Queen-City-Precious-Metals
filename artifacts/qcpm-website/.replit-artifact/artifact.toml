kind = "web"
previewPath = "/"
title = "Queen City Precious Metals"
version = "1.0.0"
id = "artifacts/qcpm-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21304

[services.development]
run = "pnpm --filter @workspace/qcpm-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/qcpm-website", "run", "build" ]
publicDir = "artifacts/qcpm-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21304"
BASE_PATH = "/"
